name: Deploy Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'firebase.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run CI Checks
        run: npm run ci:check

      - name: Build Frontend
        run: npm run build:frontend
        env:
          VITE_APP_ENV: production
          VITE_FUNCTIONS_BASE_URL: https://us-central1-scenario-lab-studio.cloudfunctions.net
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: scenario-lab-studio-d9a0e.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: scenario-lab-studio
          VITE_FIREBASE_STORAGE_BUCKET: scenario-lab-studio.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "919732775739"
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: scenario-lab-studio
